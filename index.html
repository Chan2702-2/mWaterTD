<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>Survey Pro - Aplikasi Survey Lapangan</title>
  
  <!-- Custom CSS (Mobile-First) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body class="min-h-screen bg-surface-50">
  
  <!-- Login Page -->
  <div id="login-page" class="page">
    <!-- Modern gradient background -->
    <div class="min-h-screen flex flex-col justify-center" style="background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);">
      <!-- Header -->
      <div class="flex-1 flex flex-col justify-center items-center px-6 py-12">
        <!-- Logo & Title Row -->
        <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 24px;">
          <div style="width: 56px; height: 56px; min-width: 56px; background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(14, 165, 233, 0.25);">
            <svg style="width: 28px; height: 28px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
          </div>
          <div>
            <h1 style="font-size: 24px; font-weight: 700; color: #111827; letter-spacing: -0.025em; margin: 0;">Survey Pro</h1>
            <p style="color: #6b7280; font-size: 12px; margin: 0;">Aplikasi Survey Lapangan</p>
          </div>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-card-modern w-full max-w-sm">
          <div class="space-y-5">
            <div>
              <label for="login-email" class="input-label text-gray-700 font-medium mb-2 block">Email</label>
              <input type="email" id="login-email" class="input-modern" placeholder="email@anda.com" required autocomplete="email">
            </div>
            <div>
              <label for="login-password" class="input-label text-gray-700 font-medium mb-2 block">Password</label>
              <input type="password" id="login-password" class="input-modern" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <div class="pt-2">
              <button type="submit" id="login-btn" class="btn-modern w-full">
                <span class="relative z-10">Masuk</span>
              </button>
            </div>
          </div>
        </form>

        <!-- Signup Form (Hidden by default) -->
        <form id="signup-form" class="auth-card-modern w-full max-w-sm hidden">
          <div class="space-y-5">
            <div>
              <label for="signup-name" class="input-label text-gray-700 font-medium mb-2 block">Nama Lengkap</label>
              <input type="text" id="signup-name" class="input-modern" placeholder="Nama Anda" required>
            </div>
            <div>
              <label for="signup-email" class="input-label text-gray-700 font-medium mb-2 block">Email</label>
              <input type="email" id="signup-email" class="input-modern" placeholder="email@anda.com" required autocomplete="email">
            </div>
            <div>
              <label for="signup-password" class="input-label text-gray-700 font-medium mb-2 block">Password</label>
              <input type="password" id="signup-password" class="input-modern" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <button type="submit" id="signup-btn" class="btn-modern w-full">
              <span class="relative z-10">Daftar Sekarang</span>
            </button>
          </div>
        </form>

        <!-- Toggle Auth Mode -->
        <div class="mt-8 text-center">
          <button type="button" onclick="AuthPage.toggleAuthMode()" class="text-primary-600 font-semibold hover:text-primary-700 transition-colors">
            <span id="toggle-text">Belum punya akun? <span class="underline">Daftar Gratis</span></span>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="px-6 py-6 text-center text-sm text-gray-400">
        © 2024 Survey Pro. All rights reserved.
      </div>
    </div>
  </div>

  <!-- Dashboard Page -->
  <div id="dashboard-page" class="page hidden">
    <!-- Mobile Header Modern -->
    <div class="mobile-header card-modern mb-6" style="border-radius: 0 0 24px 24px;">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-900" style="letter-spacing: -0.025em;">Dashboard</h1>
          <p class="text-sm text-gray-500">Selamat datang 👋</p>
        </div>
        <div class="avatar-modern avatar-sm-modern" id="user-initial">
          U
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="p-6 pb-28 space-y-6">
      <!-- Stats -->
      <div id="stats-container">
        <div class="grid grid-cols-2 gap-6">
          <div class="stat-card-modern">
            <div class="spinner-modern mx-auto"></div>
          </div>
          <div class="stat-card-modern">
            <div class="spinner-modern mx-auto"></div>
          </div>
        </div>
      </div>

      <!-- Map Preview -->
      <div class="card">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-gray-900">Peta Lokasi Survey</h2>
          <a href="#" onclick="Navigation.navigate('map-view'); return false;" class="text-sm text-primary-600 font-medium">Lihat Full</a>
        </div>
        <div id="dashboard-map" class="map-container h-48"></div>
      </div>

      <!-- Recent Surveys -->
      <div>
        <h2 class="font-semibold text-gray-900 mb-3">Survey Terbaru</h2>
        <div id="recent-surveys">
          <div class="card py-8 text-center">
            <div class="spinner mx-auto"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loader -->
    <div id="dashboard-loader" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center hidden">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Survey Page -->
  <div id="survey-page" class="page hidden">
    <!-- Mobile Header -->
    <div class="mobile-header card-modern mb-6" style="border-radius: 0 0 24px 24px;">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-900" style="letter-spacing: -0.025em;">Survey</h1>
          <p class="text-sm text-gray-500">Pilih form</p>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="p-6 pb-28">
      <div id="forms-list" class="space-y-4">
        <div class="card-modern py-10 text-center">
          <div class="spinner-modern mx-auto"></div>
        </div>
      </div>
    </div>

    <!-- Loader -->
    <div id="survey-loader" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center hidden">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Survey Form Page -->
  <div id="survey-form-page" class="page hidden">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <div class="flex items-center justify-between">
        <button id="survey-form-back" class="p-2 -ml-2 hover:bg-surface-100 rounded-lg">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h1 class="text-lg font-bold text-gray-900">Isi Survey</h1>
        <div class="w-8"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="p-4">
      <div id="survey-form-container">
        <div class="card py-8 text-center">
          <div class="spinner mx-auto"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Data Page -->
  <div id="data-page" class="page hidden">
    <!-- Mobile Header -->
    <div class="mobile-header card-modern mb-6" style="border-radius: 0 0 24px 24px;">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-900" style="letter-spacing: -0.025em;">Data Survey</h1>
          <p class="text-sm text-gray-500">Lihat semua survey</p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="DataPage.exportData('csv')" class="p-3 text-gray-600 hover:bg-surface-100 rounded-xl" title="Export CSV">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="p-6 pb-28 space-y-6">
      <!-- Filters -->
      <div id="data-filters"></div>

      <!-- Surveys List -->
      <div id="surveys-list" class="space-y-4"></div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-overlay hidden">
      <div class="modal-content p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-gray-900">Detail Survey</h2>
          <button onclick="document.getElementById('detail-modal').classList.add('hidden')" class="p-2 hover:bg-surface-100 rounded-lg">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div id="detail-content"></div>
      </div>
    </div>

    <!-- Loader -->
    <div id="data-loader" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center hidden">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Map View Page -->
  <div id="map-view-page" class="page hidden">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <div class="flex items-center justify-between">
        <button onclick="Navigation.navigate('dashboard')" class="p-2 -ml-2 hover:bg-surface-100 rounded-lg">
          <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h1 class="text-lg font-bold text-gray-900">Peta Survey</h1>
        <div class="w-8"></div>
      </div>
    </div>

    <!-- Map -->
    <div id="full-map" class="h-[calc(100vh-60px)]"></div>
  </div>

  <!-- Profile Page -->
  <div id="profile-page" class="page hidden">
    <!-- Mobile Header -->
    <div class="mobile-header card-modern mb-6" style="border-radius: 0 0 24px 24px;">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold text-gray-900" style="letter-spacing: -0.025em;">Profil</h1>
          <p class="text-sm text-gray-500">Kelola akun</p>
        </div>
        <div class="w-8"></div>
      </div>
    </div>

    <!-- Content -->
    <div class="p-6 pb-28">
      <div id="profile-content"></div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav bottom-nav-modern" style="padding: 0.75rem 0.5rem; padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0));">
    <div class="flex items-center justify-around">
      <a href="#" class="bottom-nav-item-modern active" data-page="dashboard">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span>Home</span>
      </a>
      <a href="#" class="bottom-nav-item-modern" data-page="survey">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <span>Survey</span>
      </a>
      <a href="#" class="bottom-nav-item-modern" data-page="data">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
        </svg>
        <span>Data</span>
      </a>
      <a href="#" class="bottom-nav-item-modern" data-page="profile">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span>Profil</span>
      </a>
    </div>
  </nav>

  <!-- Scripts -->
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  
  <!-- PWA Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered:', registration.scope);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
